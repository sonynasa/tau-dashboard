    </div>
    <footer>数据范围 2026-01-01 至 2026-07-19 · 日期变更自动刷新图表</footer>
</div>

            text: roiData.map(v => v.roi.toFixed(2)), textposition: 'outside'
        };
        let layout = { title: '', yaxis: { title: '投产比 (ROI)' }, xaxis: { title: '渠道', tickangle: -30 }, margin: { t: 30 } };
        layout = applyCommonLayout(layout);
        Plotly.newPlot('chart2', [trace], layout);
    }
    
    function renderChart3(filtered) {
        const agg = aggregate(filtered);
        const items = Object.entries(agg.channelCost).filter(([_,v]) => v > 0);
        if(items.length === 0) {
            document.getElementById('chart3').innerHTML = '<div style="color:gray; text-align:center;">无投流费用数据</div>';
            return;
        }
        const trace = {
            labels: items.map(v=>v[0]), values: items.map(v=>v[1]), type: 'pie', hole: 0.4,
            textinfo: 'label+percent', marker: { colors: colorPalette.pieColors }
        };
        let layout = { margin: { t: 20 } };
        layout = applyCommonLayout(layout);
        Plotly.newPlot('chart3', [trace], layout);
    }
    
    function renderChart4(filtered) {
        const agg = aggregate(filtered);
        const costArr = channels.map(ch => ({ channel: ch, cost: agg.channelCost[ch] }));
        costArr.sort((a,b) => b.cost - a.cost);
        const trace = {
            x: costArr.map(v=>v.channel), y: costArr.map(v=>v.cost), type: 'bar',
            marker: { color: colorPalette.secondary, opacity: 0.85 },
            text: costArr.map(v=>v.cost.toFixed(0)), textposition: 'outside'
        };
        let layout = { yaxis: { title: '投流费用 (元)' }, xaxis: { tickangle: -30 }, margin: { t: 30 } };
        layout = applyCommonLayout(layout);
        Plotly.newPlot('chart4', [trace], layout);
    }
    
    function renderChart5(filtered) {
        const dates = filtered.map(d => d.date);
        const roi = filtered.map(d => d.total_cost === 0 ? (d.total_sales > 0 ? 0 : 0) : d.total_sales / d.total_cost);
        const trace = {
            x: dates, y: roi, type: 'scatter', mode: 'lines+markers', name: '整体ROI',
            line: { color: colorPalette.primary, width: 2.5 }, marker: { size: 4, color: colorPalette.primary }
        };
        let layout = {
            yaxis: { title: '投产比 (ROI)', gridcolor: colorPalette.gridColor },
            xaxis: { title: '日期', tickangle: -30 },
            shapes: [{
                type: 'line', x0: dates[0], x1: dates[dates.length-1], y0: 2, y1: 2,
                line: { color: 'red', dash: 'dash', width: 1.6 }, name: '盈亏平衡线'
            }]
        };
        layout = applyCommonLayout(layout);
        Plotly.newPlot('chart5', [trace], layout);
    }
    
    function renderChart6(startDateStr, endDateStr) {
        const monthsInRange = getMonthsInRange(startDateStr, endDateStr);
        const actualData = fullData.filter(d => d.date.slice(0,4) === '2026' && d.date >= startDateStr && d.date <= endDateStr);
        let shopActual = {};
        for (let item of targetData) { shopActual[item.shop] = 0; }
        for (let day of actualData) {
            for (let shopItem of targetData) {
                let channelName = shopItem.channel;
                if (channelName && day[channelName + "_sales"] !== undefined) {
                    shopActual[shopItem.shop] += day[channelName + "_sales"];
                }
            }
        }
        let shopTarget = {};
        for (let item of targetData) {
            let total = 0;
            for (let m of monthsInRange) {
                if (m >= 1 && m <= 12) total += item.monthly[m-1];
            }
            shopTarget[item.shop] = total;
        }
        let shops = targetData.map(item => item.shop);
        let actualValues = shops.map(shop => shopActual[shop]);
        let targetValues = shops.map(shop => shopTarget[shop]);
        
        let traceActual = {
            x: shops, y: actualValues, name: '实际销售额', type: 'bar',
            marker: { color: colorPalette.primary }, text: actualValues.map(v => v.toFixed(0)), textposition: 'outside'
        };
        let traceTarget = {
            x: shops, y: targetValues, name: '目标销售额', type: 'bar',
            marker: { color: colorPalette.secondary }, text: targetValues.map(v => v.toFixed(0)), textposition: 'outside'
        };
        let monthRangeText = monthsInRange.length ? monthsInRange.join(', ') + '月' : '无目标月份';
        let layout = {
            title: `日期范围: ${startDateStr} 至 ${endDateStr} | 涵盖月份: ${monthRangeText}`,
            yaxis: { title: '销售额 (元)' }, xaxis: { title: '店铺', tickangle: -30 }, barmode: 'group',
            margin: { t: 70, b: 80 }
        };
        layout = applyCommonLayout(layout);
        Plotly.newPlot('chart6', [traceActual, traceTarget], layout, { responsive: true });
    }
    
    function renderChart7(endDateStr) {
        const actualData = fullData.filter(d => d.date.slice(0,4) === '2026' && d.date <= endDateStr);
        let totalActual = 0;
        for (let day of actualData) totalActual += day.total_sales;
        let completionPercent = (totalActual / totalAnnualTarget) * 100;
        completionPercent = Math.min(completionPercent, 100);
        
        const steps = [
            { range: [0, 20], color: "#d4f1f1" },
            { range: [20, 40], color: "#a8e0e0" },
            { range: [40, 60], color: "#7dcece" },
            { range: [60, 80], color: "#52bdbd" },
            { range: [80, 100], color: "#27abab" }
        ];
        
        let trace = {
            type: "indicator",
            mode: "gauge+number",
            value: completionPercent,
            gauge: {
                axis: {
                    range: [0, 100],
                    tickwidth: 1,
                    tickcolor: "#1a5c5c",
                    tickvals: [0, 20, 40, 60, 80, 100],
                    ticktext: ["0", "20", "40", "60", "80", "100"],
                    tickfont: { size: 10, color: "#1a5c5c" },
                    ticks: "inside"
                },
                bar: { 
                    color: "#2c8c8c", 
                    thickness: 0.3,
                    line: { color: "white", width: 1.6 }
                },
                bgcolor: "rgba(255,255,255,0.6)",
                bordercolor: "#bfeded",
                borderwidth: 1,
                shape: "angular",
                steps: steps
            },
            number: { 
                suffix: "%", 
                font: { size: 32, color: "#1a5c5c", family: "Inter, monospace" },
                valueformat: ".1f"
            }
        };
        
        let layout = { 
            width: '95%', 
            height: '95%',
            margin: { t: 40, b: 20, l: 20, r: 20 },
            autosize: false
        };
        layout = applyCommonLayout(layout);
        Plotly.newPlot('chart7', [trace], layout, { responsive: true });
    }
    
    // 新增：更新摘要卡片
    function updateSummary(filtered) {
    let totalSales = 0;
    let totalCost = 0;
    filtered.forEach(day => {
        totalSales += day.total_sales;
        totalCost += day.total_cost;
    });
    let roi = totalCost === 0 ? 0 : totalSales / totalCost;
    const formatNum = (num) => {
        if (num === 0) return '0';
        return Math.round(num).toLocaleString();  // 原生千分位格式化
    };
    document.getElementById('totalSales').textContent = '¥' + formatNum(totalSales);
    document.getElementById('totalCost').textContent = '¥' + formatNum(totalCost);
    document.getElementById('totalRoi').textContent = roi.toFixed(2);
}
    
    function refreshAll() {
        let start = startInput.value, end = endInput.value;
        if(!start) start = defaultStartStr;
        if(!end) end = maxDateStr;
        if(start > end) { alert("起始日期不能大于结束日期！"); return; }
        const filtered = filterByDate(start, end);
        if(filtered.length === 0) { alert("所选范围无数据"); return; }
        // 更新摘要卡片
        updateSummary(filtered);
        renderChart1(filtered);
        renderChart2(filtered);
        renderChart3(filtered);
        renderChart4(filtered);
        renderChart5(filtered);
        renderChart6(start, end);
        renderChart7(end);
    }
    
    // 自动刷新事件
    startInput.addEventListener('change', refreshAll);
    endInput.addEventListener('change', refreshAll);
    
    // 快捷按钮
    btn7days.addEventListener('click', () => {
        let end = new Date(maxDateStr);
        let start = new Date(end);
        start.setDate(end.getDate() - 6);
        let startStr = start.toISOString().slice(0,10);
        let endStr = end.toISOString().slice(0,10);
        if (startStr < minDateStr) startStr = minDateStr;
        startInput.value = startStr; endInput.value = endStr;
        refreshAll();
    });
    btn30days.addEventListener('click', () => {
        let end = new Date(maxDateStr);
        let start = new Date(end);
        start.setDate(end.getDate() - 29);
        let startStr = start.toISOString().slice(0,10);
        let endStr = end.toISOString().slice(0,10);
        if (startStr < minDateStr) startStr = minDateStr;
        startInput.value = startStr; endInput.value = endStr;
        refreshAll();
    });
    btnMonth.addEventListener('click', () => {
        const overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.left = '0';
        overlay.style.top = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.background = 'rgba(0,0,0,0.3)';
        overlay.style.backdropFilter = 'blur(4px)';
        overlay.style.zIndex = '9998';
        document.body.appendChild(overlay);

        const monthInput = document.createElement('input');
        monthInput.type = 'month';
        monthInput.style.position = 'fixed';
        monthInput.style.left = '10%';
        monthInput.style.top = '35%';
        monthInput.style.width = '80%';
        monthInput.style.padding = '18px';
        monthInput.style.fontSize = '18px';
        monthInput.style.border = '2px solid #2c8c8c';
        monthInput.style.borderRadius = '16px';
        monthInput.style.background = '#ffffff';
        monthInput.style.boxShadow = '0 12px 40px rgba(0,0,0,0.25)';
        monthInput.style.zIndex = '9999';
        monthInput.style.color = '#1a3c3c';
        monthInput.value = "2026-07";
        document.body.appendChild(monthInput);

        monthInput.focus();
        if (monthInput.showPicker) {
            monthInput.showPicker();
        } else {
            monthInput.click();
        }

        monthInput.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val) {
                const [year, month] = val.split('-');
                const firstDay = `${year}-${month}-01`;
                const lastDate = new Date(parseInt(year), parseInt(month), 0).getDate();
                const lastDay = `${year}-${month}-${lastDate < 10 ? '0'+lastDate : lastDate}`;
                let startStr = firstDay, endStr = lastDay;
                if (startStr < minDateStr) startStr = minDateStr;
                startInput.value = startStr;
                endInput.value = endStr;
                refreshAll();
            }
            document.body.removeChild(monthInput);
            document.body.removeChild(overlay);
        });

        monthInput.addEventListener('blur', () => {
            if (document.body.contains(monthInput)) {
                document.body.removeChild(monthInput);
            }
            if (document.body.contains(overlay)) {
                document.body.removeChild(overlay);
            }
        });
    });
    
    btnDay.addEventListener('click', () => {
        const overlay = document.createElement('div');
        overlay.style.position = 'fixed';
        overlay.style.left = '0';
        overlay.style.top = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.background = 'rgba(0,0,0,0.3)';
        overlay.style.backdropFilter = 'blur(4px)';
        overlay.style.zIndex = '9998';
        document.body.appendChild(overlay);

        const dateInput = document.createElement('input');
        dateInput.type = 'date';
        dateInput.style.position = 'fixed';
        dateInput.style.left = '10%';
        dateInput.style.top = '35%';
        dateInput.style.width = '80%';
        dateInput.style.padding = '18px';
        dateInput.style.fontSize = '18px';
        dateInput.style.border = '2px solid #2c8c8c';
        dateInput.style.borderRadius = '16px';
        dateInput.style.background = '#ffffff';
        dateInput.style.boxShadow = '0 12px 40px rgba(0,0,0,0.25)';
        dateInput.style.zIndex = '9999';
        dateInput.style.color = '#1a3c3c';
        dateInput.value = defaultDayStr;
        document.body.appendChild(dateInput);

        dateInput.focus();
        if (dateInput.showPicker) {
            dateInput.showPicker();
        } else {
            dateInput.click();
        }

        dateInput.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val) {
                let startStr = val, endStr = val;
                if (startStr < minDateStr) startStr = minDateStr;
                if (endStr > maxDateStr) endStr = maxDateStr;
                startInput.value = startStr;
                endInput.value = endStr;
                refreshAll();
            }
            document.body.removeChild(dateInput);
            document.body.removeChild(overlay);
        });

        dateInput.addEventListener('blur', () => {
            if (document.body.contains(dateInput)) {
                document.body.removeChild(dateInput);
            }
            if (document.body.contains(overlay)) {
                document.body.removeChild(overlay);
            }
        });
    });
    
    window.addEventListener('load', () => {
        startInput.value = defaultStartStr;
        endInput.value = maxDateStr;
        refreshAll();
    });
    
    function initSportsBg() {
        const icons = ['fa-running', 'fa-swimmer', 'fa-biking', 'fa-skiing', 'fa-person-walking', 'fa-person-biking', 'fa-water', 'fa-snowboarding'];
        const container = document.getElementById('sportsBg');
        for(let i=0;i<45;i++) {
            const icon = document.createElement('i');
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            icon.className = `fas ${randomIcon}`;
            const size = Math.random() * 40 + 20;
            icon.style.fontSize = size + 'px';
            icon.style.left = Math.random() * 100 + '%';
            icon.style.animationDuration = Math.random() * 15 + 10 + 's';
            icon.style.animationDelay = Math.random() * 20 + 's';
            icon.style.opacity = Math.random() * 0.25 + 0.05;
            icon.style.color = '#3fa8a8';
            container.appendChild(icon);
        }
    }
    initSportsBg();
</script>
